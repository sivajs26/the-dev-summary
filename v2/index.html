    <style>
        html {
            scroll-behavior: smooth;
        }



        :root {
            /* VS Code Dark Palette */
            --bg-editor: #1e1e1e;
            --bg-sidebar: #252526;
            --bg-header: #323233;
            --bg-tabs: #2d2d2d;
            --text-main: #d4d4d4;
            --text-muted: #858585;
            --accent: #007acc;
            /* VS Blue */
            --border-color: #333333;

            /* Syntax Colors */
            --syntax-keyword: #569cd6;
            /* Blue */
            --syntax-string: #ce9178;
            /* Orange/Ginger */
            --syntax-function: #dcdcaa;
            /* Yellow */
            --syntax-comment: #6a9955;
            /* Green */
            --syntax-type: #4ec9b0;
            /* Teal */

            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-mono);
            background-color: var(--bg-sidebar);
            /* Side bar color for initial load */
            color: var(--text-main);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            /* App container will handle scroll */
            width: 100vw;
            height: 100vh;
        }

        /* ---------------- APP CONTAINER (WORKSPACE) ---------------- */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            padding-bottom: 22px;
            /* For status bar */
        }

        /* ---------------- ACTIVITY BAR (FAR LEFT) ---------------- */
        .activity-bar {
            width: 50px;
            flex-shrink: 0;
            background: #333333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 15px;
            gap: 20px;
            z-index: 1000;
        }

        .activity-item {
            color: var(--text-muted);
            font-size: 20px;
            padding: 10px;
            transition: color 0.2s;
            position: relative;
        }

        .activity-item.active {
            color: var(--text-main);
            border-left: 2px solid var(--text-main);
        }

        .activity-item:hover {
            color: var(--text-main);
        }

        /* ---------------- SIDEBAR (EXPLORER) ---------------- */
        .sidebar {
            width: 260px;
            flex-shrink: 0;
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            transition: width 0.3s ease;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .sidebar.collapsed {
            width: 0;
            border-right: none;
        }

        .sidebar-header {
            padding: 10px 20px;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
        }

        .section-title {
            padding: 5px 10px;
            font-size: 11px;
            font-weight: 700;
            background: #383838;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .section-title i {
            font-size: 10px;
            transition: transform 0.2s;
        }

        .category-list {
            padding: 5px 0;
            list-style: none;
        }

        .category-item {
            padding: 4px 20px;
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.1s;
            white-space: nowrap;
        }

        .category-item:hover {
            background: #2a2d2e;
            color: var(--text-main);
        }

        .category-item.active {
            background: #37373d;
            color: white;
            border-left: 2px solid var(--accent);
            padding-left: 18px;
            /* Offset for border */
        }

        .category-item i {
            width: 16px;
            text-align: center;
            font-size: 14px;
        }

        /* ---------------- MAIN EDITOR AREA ---------------- */
        .editor-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-editor);
            overflow: hidden;
            position: relative;
        }

        .tabs-nav {
            background: var(--bg-tabs);
            display: flex;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tab {
            padding: 8px 20px;
            font-size: 12px;
            color: var(--text-muted);
            background: #2d2d2d;
            border-right: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            white-space: nowrap;
        }

        .tab.active {
            background: var(--bg-editor);
            color: var(--text-main);
        }

        .tab i {
            font-size: 14px;
            color: var(--syntax-type);
        }

        .editor-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* ---------------- IDE HEADER (TITLE BAR) ---------------- */
        .masthead {
            max-width: 100%;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            padding: 8px 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .masthead-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: none;
            border-bottom: none;
            padding-bottom: 0;
        }

        #dateDisplay {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .masthead h1 {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-muted);
            text-align: center;
            letter-spacing: 0;
            text-transform: none;
            margin: 0;
        }

        .masthead p {
            display: none;
            /* Hide subtitle for cleaner IDE look */
        }







        /* ---------------- GIT STATUS INDICATORS ---------------- */
        .news-card.git-added {
            border-left: 3px solid #487e4a;
            /* Green */
        }

        .news-card.git-modified {
            border-left: 3px solid #1c448e;
            /* Blue */
        }

        /* ---------------- MAIN FEED (EDITOR VIEW) ---------------- */
        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        #news-feed {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
        }

        .news-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 15px;
            position: relative;
            opacity: 0;
            transform: translateY(10px);
            animation: ideFadeIn 0.4s ease forwards;
        }

        @keyframes ideFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .news-card:hover {
            border-color: #444;
            background: rgba(255, 255, 255, 0.04);
        }

        /* Spans */
        .card-featured {
            grid-column: span 12;
            flex-direction: row;
            gap: 20px;
        }

        .card-wide {
            grid-column: span 6;
        }

        .card-regular {
            grid-column: span 4;
        }

        .card-side {
            grid-column: span 3;
            border-left: 1px dashed var(--border-color);
            padding-left: 20px;
        }

        .news-image-wrapper {
            width: 100%;
            height: 180px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            margin-bottom: 12px;
            background: #000;
        }

        .card-featured .news-image-wrapper {
            width: 40%;
            height: 350px;
        }

        .card-featured .news-content {
            width: 60%;
        }

        .news-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .news-card:hover .news-image {
            opacity: 1;
        }

        .news-meta {
            font-size: 11px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            color: var(--syntax-comment);
        }

        .news-meta span:first-child {
            color: var(--syntax-type);
        }

        .news-title {
            font-size: 16px;
            margin-bottom: 10px;
            color: var(--syntax-function);
            line-height: 1.4;
        }

        .news-title a {
            text-decoration: none;
            color: inherit;
        }

        .news-title a::before {
            content: "";
        }

        .news-title a::after {
            content: "";
        }

        .news-desc {
            font-size: 13px;
            color: var(--text-main);
            margin-bottom: 15px;
            position: relative;
            padding-left: 15px;
            border-left: 2px solid #333;
        }

        .news-desc::before {
            content: "";
        }

        .news-desc::after {
            content: "";
        }

        .read-more {
            color: var(--syntax-string);
            font-size: 12px;
            text-decoration: underline;
            margin-left: 5px;
            cursor: pointer;
        }

        .action-icons {
            display: flex;
            gap: 15px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .action-icons i:hover {
            color: var(--accent);
            cursor: pointer;
        }

        /* ---------------- LOADING ---------------- */
        .loading-text {
            grid-column: span 12;
            text-align: center;
            padding: 50px;
            color: var(--syntax-keyword);
            font-size: 14px;
        }

        .loading-text::before {
            content: "";
        }

        /* ---------------- FOOTER (STATUS BAR) ---------------- */
        footer {
            background: var(--accent);
            color: white;
            padding: 5px 20px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 1000;
        }

        footer a {
            color: white;
            text-decoration: none;
            font-weight: 700;
        }



        /* Mobile Hacks */
        @media (max-width: 768px) {
            .card-featured {
                flex-direction: column;
            }

            .card-featured .news-image-wrapper,
            .card-featured .news-content {
                width: 100%;
            }

            .card-featured,
            .card-wide,
            .card-regular,
            .card-side {
                grid-column: span 12;
            }
        }
    </style>
</head>

<body>
    <header class="masthead">

        <h1>The Dev Summary</h1>
    </header>


    <div class="app-container">
        <!-- Activity Bar -->
        <div class="activity-bar">
            <div class="activity-item active" id="activity-explorer" onclick="handleActivityClick(this, 'explorer')"
                title="Explorer">
                <i class="fas fa-copy"></i>
            </div>
            <div class="activity-item" id="activity-saved" onclick="handleActivityClick(this, 'saved')"
                title="Saved Articles">
                <i class="fas fa-bookmark"></i>
            </div>
        </div>

        <!-- Sidebar Explorer -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span>Explorer</span>
                <i class="fas fa-ellipsis-h"></i>
            </div>

            <div class="sidebar-section">
                <div class="section-title">
                    <i class="fas fa-chevron-down"></i> NEWS_CATEGORIES
                </div>
                <ul class="category-list" id="categoryList">
                    <!-- Categories will be injected here -->
                </ul>
            </div>
        </aside>

        <!-- Main Editor Area -->
        <div class="editor-area">



            <div class="editor-content">
                <main>
                    <div id="news-feed">
                        <div class="loading-text">connecting_to_server...</div>
                    </div>
                </main>
            </div>
        </div>
    </div>



    <footer>
        <div style="display: flex; align-items: center; gap: 10px;">
            <a href="https://sivasubramoniam-js.github.io/the-dev-summary/"
                style="color: inherit; text-decoration: none; display: flex; align-items: center; gap: 6px;"
                title="Switch to Version 1">
                <i class="fas fa-exchange-alt" style="font-size: 10px;"></i>
                <span>v1</span>
            </a>
            <div class="archive-container"
                style="margin-left: 15px; background: rgba(255,255,255,0.1); padding: 0 5px; border-radius: 2px;">
                <i class="fas fa-history" style="font-size: 10px; margin-right: 4px;"></i>
                <select id="archivePicker"
                    style="background: transparent; color: white; border: none; font-size: 11px; font-family: inherit; cursor: pointer; outline: none;">
                    <option value="news.json" style="color: black;">Latest Feed</option>
                </select>
            </div>
        </div>
        <div id="dateDisplay"></div>
        <div style="display: flex; gap: 15px;">
            <span>UTF-8</span>
            <span>Javascript</span>
            <span>The Dev Summary v2.1</span>
        </div>
    </footer>

    <script>
        // --- Global Action Handlers ---
        function copyToClipboard(event) {
            event.preventDefault();
            event.stopPropagation();

            const card = event.target.closest('.news-card');
            if (!card) return;

            // Extract dynamically rendered text directly from DOM using textContent which is immune to visibility/translation DOM wrapping quirks
            const title = card.querySelector('.news-title')?.textContent.trim() || '';
            const description = card.querySelector('.news-desc')?.textContent.trim() || '';
            const textToCopy = `${title} : ${description}`;

            navigator.clipboard.writeText(textToCopy).then(() => {
                const icon = event.target;
                const originalClass = icon.className;
                icon.className = 'fas fa-check text-green-500';
                icon.style.color = 'var(--text-main)';
                setTimeout(() => {
                    icon.className = originalClass;
                    icon.style.color = '';
                }, 2000);
            }).catch(err => console.error('Failed to copy: ', err));
        }

        function downloadAsImage(event) {
            event.preventDefault();
            event.stopPropagation();

            const icon = event.target;
            const originalIconClass = icon.className;
            icon.className = "fas fa-spinner fa-spin"; // Show loading state

            const card = event.target.closest('.news-card');

            const renderAndDownload = async () => {
                // Extract the exact textual and visual content asynchronously
                const imgEl = card.querySelector('.news-image');
                const imgSrc = imgEl ? imgEl.src : null;
                const title = card.querySelector('.news-title').textContent.trim();
                const desc = card.querySelector('.news-desc').textContent.trim();
                const dateEl = document.getElementById('dateDisplay');
                const dateStr = dateEl ? dateEl.textContent.trim() : "The Dev Summary";

                // Helper to convert image URL to base64 data URL
                const toBase64 = async (url) => {
                    try {
                        const resp = await fetch(BASE_RAW_URL + url);
                        const blob = await resp.blob();
                        return await new Promise((resolve, reject) => {
                            const reader = new FileReader();
                            reader.onloadend = () => resolve(reader.result);
                            reader.onerror = reject;
                            reader.readAsDataURL(blob);
                        });
                    } catch (e) {
                        console.error('Base64 conversion failed', e);
                        return url; // fallback to original URL if conversion fails
                    }
                };

                const imgData = imgSrc ? await toBase64(`https://images.weserv.nl/?url=${encodeURIComponent(imgSrc)}`) : null;

                // Programmatically construct a perfectly structured exact 4:5 offline poster div (1080x1350 resolution)
                const poster = document.createElement('div');
                poster.style.position = 'absolute'; // Position absolute avoids viewport issues during scaling
                poster.style.top = '-9999px'; // Render entirely off-screen
                poster.style.left = '-9999px';
                poster.style.width = '1080px';
                poster.style.height = '1350px';
                poster.style.backgroundColor = '#f9f8f4'; // Premium editorial paper white
                poster.style.padding = '80px 80px 10px 80px'; // 10px exactly at the bottom precisely locks the footer!
                poster.style.boxSizing = 'border-box';
                poster.style.display = 'flex';
                poster.style.flexDirection = 'column';
                poster.style.color = 'var(--text-main)';
                poster.style.zIndex = '-100';

                // Safely format Image Block using base64 data URL to avoid CORS issues
                let imgHTML = '';
                if (imgData) {
                    imgHTML = `
                        <div style="width: 100%; height: 500px; border-radius: 4px; margin-bottom: 40px; border: 1px solid rgba(0,0,0,0.1); background-color: #e0e0e0; background-image: url('${imgData}'); background-size: cover; background-position: center; background-repeat: no-repeat;">
                        </div>
                    `;
                }

                // Build immaculate HTML Layout natively
                poster.innerHTML = `
                    <div style="flex-grow: 1; display: flex; flex-direction: column;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 3px solid var(--border-color); padding-bottom: 25px; margin-bottom: 40px;">
                            <div style="font-family: var(--font-display), serif; font-size: 40px; text-transform: uppercase; font-weight: 800; line-height: 1; letter-spacing: -0.02em;">The Dev Summary</div>
                            <div style="font-family: var(--font-mono), monospace; font-size: 22px; color: var(--text-muted); text-transform: uppercase;">${dateStr}</div>
                        </div>
                        
                        ${imgHTML}
                        
                        <h2 style="font-family: var(--font-serif), serif; font-size: 42px; line-height: 1.25; margin: 0 0 35px 0; font-weight: 700;">${title}</h2>
                        <p style="font-family: var(--font-sans), sans-serif; font-size: 32px; color: #333333; line-height: 1.55; margin: 0; overflow: hidden;">${desc}</p>
                    </div>
                    
                    <div style="display: flex; justify-content: center; align-items: center; height: 50px; color: #666666; font-family: var(--font-mono), monospace; font-size: 20px; font-weight: 600; margin-bottom: 12px">
                        <span style="margin-right: 25px;"><i class="fab fa-github" style="margin-right: 8px;"></i>sivasubramoniam-js/the-dev-summary</span>
                        <span><i class="fas fa-globe" style="margin-right: 8px;"></i>sivasubramoniam-js.github.io/the-dev-summary</span>
                    </div>
                `;

                // Inject strictly for the backend Canvas engine to target
                document.body.appendChild(poster);

                // Delay execution momentarily to guarantee font-families append cleanly to the injected DOM graph
                setTimeout(() => {
                    html2canvas(poster, {
                        useCORS: true,
                        scale: 1.5,
                        backgroundColor: '#f9f8f4',
                        logging: false
                    }).then(canvas => {
                        const link = document.createElement('a'); link.download = `tech-news-highlight.png`;
                        link.href = canvas.toDataURL('image/png', 1.0);
                        link.click();
                        poster.remove(); // Safely destroy the phantom DOM element
                        icon.className = originalIconClass; // Restore download UI
                    }).catch(err => {
                        console.error("DOM Image Render failed", err);
                        poster.remove();
                        icon.className = originalIconClass;
                        alert("Sorry! Failed to render the card as an image.");
                    });
                }, 150);
            };

            // Dynamically load html2canvas to save initial page load bandwidth
            if (typeof html2canvas === 'undefined') {
                const script = document.createElement('script');
                script.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
                script.onload = renderAndDownload;
                document.head.appendChild(script);
            } else {
                renderAndDownload();
            }
        }

        // Set dynamic masthead date
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const dateStr = new Date().toLocaleDateString('en-US', options);
        document.getElementById('dateDisplay').textContent = dateStr;

        // Categories Configuration
        let categories = [];
        let currentCategory = '';
        let allNewsData = []; // Store the full list for local filtering
        let currentDisplayedData = []; // Store currently visible news for dialog lookup
        let isInitialLoad = true; // Flag to prevent scroll on first load

        async function initCategoryNav() {
            // Dynamically extract unique categories from the news data
            const uniqueCategories = new Set();
            allNewsData.forEach(item => {
                let cat = item.category || 'Tech';
                if (cat.toLowerCase() === 'general tech') cat = 'Tech';
                uniqueCategories.add(cat);
            });

            // Sorted alphabetically
            categories = Array.from(uniqueCategories).sort((a, b) => a.localeCompare(b));

            const list = document.getElementById('categoryList');
            list.innerHTML = '';

            // Saved Items trigger is now ONLY in the Activity Bar (bookmarks icon)
            // Removed from here to satisfy user request

            categories.forEach(cat => {
                const li = document.createElement('li');
                li.className = `category-item ${cat.toLowerCase() === currentCategory.toLowerCase() ? 'active' : ''}`;

                // Comprehensive icon mapping
                let iconClass = 'fa-folder';
                const c = cat.toLowerCase();
                if (c.includes('ai') || c.includes('intelligence')) iconClass = 'fa-robot';
                else if (c.includes('frontend') || c.includes('web') || c.includes('react')) iconClass = 'fa-code';
                else if (c.includes('backend') || c.includes('cloud') || c.includes('server')) iconClass = 'fa-server';
                else if (c.includes('mobile') || c.includes('android') || c.includes('ios')) iconClass = 'fa-mobile-alt';
                else if (c.includes('devops') || c.includes('docker') || c.includes('git')) iconClass = 'fa-infinity';
                else if (c.includes('security') || c.includes('hacker')) iconClass = 'fa-shield-alt';
                else if (c.includes('database') || c.includes('sql')) iconClass = 'fa-database';
                else if (c.includes('language') || c.includes('python') || c.includes('js')) iconClass = 'fa-terminal';

                li.innerHTML = `<i class="fas ${iconClass}"></i> ${cat}`;
                li.dataset.category = cat;
                li.onclick = () => filterByCategory(cat);
                list.appendChild(li);
            });

            // Automatically trigger filtering for the default category
            if (currentFeedUrl.includes('news.json') && currentCategory !== 'Saved Items') {
                filterByCategory(currentCategory || (categories[0] || 'Tech'));
            }
        }

        async function filterByCategory(category) {
            currentCategory = category;

            // Sync Activity Bar
            const explorerIcon = document.getElementById('activity-explorer');
            const savedIcon = document.getElementById('activity-saved');
            if (category === 'Saved Items') {
                if (explorerIcon) explorerIcon.classList.remove('active');
                if (savedIcon) savedIcon.classList.add('active');
            } else {
                if (explorerIcon) explorerIcon.classList.add('active');
                if (savedIcon) savedIcon.classList.remove('active');
            }

            // Update Sidebar UI
            document.querySelectorAll('.category-item').forEach(el => {
                const itemCat = el.dataset.category || '';
                el.classList.toggle('active', itemCat.toLowerCase() === category.toLowerCase());
            });

            const container = document.getElementById('news-feed');
            container.innerHTML = '<div class="loading-text">Filtering...</div>';

            let dataToRender = [];

            if (category === 'Saved Items') {
                dataToRender = await db.getAllArticles();
                if (dataToRender.length === 0) {
                    container.innerHTML = '<div class="loading-text">No saved articles yet. Bookmark some interesting dispatches!</div>';
                    return;
                }

            } else {
                dataToRender = allNewsData.filter(item => {
                    let itemCat = item.category || 'Tech';
                    if (itemCat.toLowerCase() === 'general tech') itemCat = 'Tech';
                    return itemCat.toLowerCase() === category.toLowerCase();
                });
            }
            // blur the news feed
            container.style.filter = 'blur(5px)';
            // Small timeout to give visual feedback
            setTimeout(() => renderNews(dataToRender), 100);
        }

        // --- IndexedDB Utility ---
        const db = {
            name: 'DevSummaryDB',
            version: 1,
            store: 'savedArticles',

            open() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.name, this.version);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(this.store)) {
                            db.createObjectStore(this.store, { keyPath: 'link' });
                        }
                    };
                    request.onsuccess = (e) => resolve(e.target.result);
                    request.onerror = (e) => reject(e.target.error);
                });
            },

            async saveArticle(article) {
                const database = await this.open();
                return new Promise((resolve, reject) => {
                    const tx = database.transaction(this.store, 'readwrite');
                    tx.objectStore(this.store).put(article);
                    tx.oncomplete = () => resolve();
                });
            },

            async removeArticle(link) {
                const database = await this.open();
                return new Promise((resolve, reject) => {
                    const tx = database.transaction(this.store, 'readwrite');
                    tx.objectStore(this.store).delete(link);
                    tx.oncomplete = () => resolve();
                });
            },

            async getAllArticles() {
                const database = await this.open();
                return new Promise((resolve, reject) => {
                    const tx = database.transaction(this.store, 'readonly');
                    const request = tx.objectStore(this.store).getAll();
                    request.onsuccess = () => resolve(request.result);
                });
            },

            async isSaved(link) {
                const database = await this.open();
                return new Promise((resolve, reject) => {
                    const tx = database.transaction(this.store, 'readonly');
                    const request = tx.objectStore(this.store).get(link);
                    request.onsuccess = () => resolve(!!request.result);
                });
            }
        };

        async function toggleSave(event, index) {
            event.preventDefault();
            event.stopPropagation();
            const icon = event.currentTarget;
            const newsItem = currentDisplayedData[index];
            const isSaved = await db.isSaved(newsItem.link);

            if (isSaved) {
                await db.removeArticle(newsItem.link);
                icon.style.color = 'var(--text-muted)';
                icon.classList.replace('fas', 'far');
                if (currentCategory === 'Saved Items') {
                    filterByCategory('Saved Items');
                }
            } else {
                await db.saveArticle(newsItem);
                icon.style.color = 'crimson';
                icon.classList.replace('far', 'fas');
            }
        }

        // Fetch and render news
        // Fetch and render news
        const BASE_RAW_URL = 'https://raw.githubusercontent.com/sivasubramoniam-js/the-dev-summary/main/';
        let currentFeedUrl = 'news.json';

        async function initArchive() {
            const picker = document.getElementById('archivePicker');
            if (!picker) return;

            try {
                const response = await fetch(BASE_RAW_URL + 'feeds/index.json');
                if (!response.ok) throw new Error('Index not found');
                const archive = await response.json();

                picker.innerHTML = ''; // Clear picker

                archive.forEach((item, index) => {
                    const option = document.createElement('option');
                    option.value = 'feeds/' + item.file;
                    option.textContent = item.date;
                    option.style.color = 'black';
                    if (index === 0) {
                        option.selected = true;
                        // Automatically fetch the first archive as it's now our "Latest"
                        fetchNews(option.value);
                    }
                    picker.appendChild(option);
                });

                picker.addEventListener('change', (e) => {
                    if (e.target.value) {
                        fetchNews(e.target.value);
                    }
                });
            } catch (error) {
                console.error('Archive index load failed:', error);
            }
        }

        async function fetchNews(url = 'news.json') {
            const container = document.getElementById('news-feed');
            container.innerHTML = '<div class="loading-text" style="color:var(--accent);">Opening the archives...</div>';

            try {
                const response = await fetch(BASE_RAW_URL + url);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();

                allNewsData = data;
                if (url.includes('news.json')) {
                    initCategoryNav();
                }
                filterByCategory(currentCategory || (categories[0] || 'Tech'));
            } catch (error) {
                console.error('Error fetching news:', error);
                document.getElementById('news-feed').innerHTML = '<div class="loading-text" style="color:var(--accent);">Error connecting to the printing press. Please try again.</div>';
            }
        }

        function renderNews(data) {
            currentDisplayedData = data; // Update lookup reference
            const container = document.getElementById('news-feed');
            container.style.filter = ''; // Reset blur immediately
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = '<div class="loading-text">No articles found in this category.</div>';
                return;
            }

            const stripHTML = (html) => {
                const tmp = document.createElement("DIV");
                tmp.innerHTML = html;
                return tmp.textContent || tmp.innerText || "";
            };

            data.forEach(async (item, index) => {
                // Determine grid class based on index to create masonry/editorial layout
                let cardClass = 'card-regular';

                if (index === 0) {
                    cardClass = 'card-featured';
                } else if (index < 5) {
                    cardClass = 'card-wide';
                }



                // Stagger animation timing
                const animDelay = (index % 10) * 0.1;

                // Calculate reading time based on description length
                const wordCount = item.description ? item.description.split(/\s+/).length : 0;
                const readTime = Math.max(1, Math.ceil(wordCount / 200));

                let image_url = item.image || "";

                const rawDesc = stripHTML(item.description || "");
                let displayDesc = rawDesc;
                let readMoreLink = "";
                if (displayDesc.length > 200) {
                    displayDesc = displayDesc.substring(0, 200);
                    readMoreLink = `<span class="read-more" onclick="window.open('${item.link}', '_blank')">...more</span>`;
                }

                const isSaved = await db.isSaved(item.link);
                const saveIconClass = isSaved ? 'fas' : 'far';
                const saveIconColor = isSaved ? 'crimson' : 'var(--text-muted)';

                // Calculate Git Status (Added/Modified)
                // If it was published in the last 12 hours -> git-added
                // Else if it's the first 10 items (fresher) -> git-modified
                let gitStatusClass = '';
                const pubDate = item.pubDate ? new Date(item.pubDate) : null;
                const now = new Date();
                if (pubDate && (now - pubDate) < (12 * 60 * 60 * 1000)) {
                    gitStatusClass = 'git-added';
                } else if (index < 10) {
                    gitStatusClass = 'git-modified';
                }

                const cardHTML = `
                    <article class="news-card ${cardClass} ${gitStatusClass}" id="news-card-${index}" style="animation-delay: ${animDelay}s">
                        ${item.image ? `
                            <div class="news-image-wrapper">
                                <img src="${image_url}" class="news-image" alt="${item.title}" loading="lazy">
                            </div>
                        ` : `<div class="news-image-wrapper" style="background:#222;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-mono)"><i class="fas fa-newspaper fa-2x"></i></div>`}
                        <div class="news-content">
                            <div class="news-meta" style="margin-bottom: 6px;">
                                <span style="color: var(--accent); padding-right: 8px;">${item.category || 'Tech'}</span>
                                <span style="font-size: 0.8rem;"><span style="color: crimson; font-weight: 700;">Source:</span> <span style="color: var(--text-muted);">${item.source || 'General'}</span></span>
                            </div>
                            <div class="news-meta">
                                <span class="action-icons" style="font-size: 1.1rem; color: var(--text-muted);">
                                    <i class="fas fa-copy" title="Copy to clipboard" style="margin-right: 15px; cursor: pointer;" onclick="copyToClipboard(event)"></i>
                                    <i class="${saveIconClass} fa-bookmark" title="Save article" style="cursor: pointer; color: ${saveIconColor};" onclick='toggleSave(event, ${index})'></i>
                                </span>
                                <span style="color: var(--text-muted);">${readTime} MIN READ</span>
                            </div>
                            <h2 class="news-title">
                                <a href="${item.link}" style="text-decoration: none; color: inherit; cursor: pointer;" target="_blank" rel="noopener noreferrer">
                                    <span class="title-hover-effect">${item.title}</span>
                                </a>
                            </h2>
                            <p class="news-desc">${displayDesc}${readMoreLink}</p>
                        </div>
                    </article>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });

            // Post-render actions
            if (!isInitialLoad) {
                const categoryNav = document.querySelector('.category-nav');
                const targetTop = categoryNav.getBoundingClientRect().top + window.scrollY - 10;
                window.scrollTo({ top: targetTop, behavior: 'smooth' });
            }
            isInitialLoad = false;


        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
        }

        function handleActivityClick(el, type) {
            const sidebar = document.getElementById('sidebar');
            const wasActive = el.classList.contains('active');
            const isCollapsed = sidebar.classList.contains('collapsed');

            // Remove active class from all
            document.querySelectorAll('.activity-item').forEach(item => item.classList.remove('active'));

            if (type === 'explorer') {
                if (wasActive && !isCollapsed) {
                    sidebar.classList.add('collapsed');
                    el.classList.remove('active');
                } else {
                    sidebar.classList.remove('collapsed');
                    el.classList.add('active');
                }
            } else if (type === 'saved') {
                el.classList.add('active');
                sidebar.classList.add('collapsed'); // Hide explorer when in saved mode
                filterByCategory('Saved Items');
            }
        }

        // Initialize
        initArchive();
        fetchNews();
    </script>

</body>
