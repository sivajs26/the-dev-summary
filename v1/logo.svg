<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="gradIcon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="6" y="6" width="52" height="52" rx="12" fill="url(#gradIcon)"/>

  <!-- Circuit nodes -->
  <circle cx="24" cy="26" r="2.5" fill="white"/>
  <circle cx="40" cy="26" r="2.5" fill="white"/>
  <circle cx="32" cy="40" r="2.5" fill="white"/>

  <!-- Circuit lines -->
  <line x1="24" y1="26" x2="40" y2="26" stroke="white" stroke-width="2"/>
  <line x1="24" y1="26" x2="32" y2="40" stroke="white" stroke-width="2"/>
  <line x1="40" y1="26" x2="32" y2="40" stroke="white" stroke-width="2"/>

  <!-- Right signal waves -->
  <path d="M44 20 Q52 32 44 44" stroke="white" stroke-width="2" fill="none" opacity="0.9"/>
  <path d="M48 16 Q60 32 48 48" stroke="white" stroke-width="2" fill="none" opacity="0.9"/>

  <!-- Left signal waves (mirrored) -->
  <path d="M20 20 Q12 32 20 44" stroke="white" stroke-width="2" fill="none" opacity="0.9"/>
  <path d="M16 16 Q4 32 16 48" stroke="white" stroke-width="2" fill="none" opacity="0.9"/>

</svg>